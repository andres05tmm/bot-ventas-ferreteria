<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Ferretería Punto Rojo — Dashboard</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#C8200E" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Punto Rojo" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />

    <!-- Splash screen color en iOS -->
    <meta name="msapplication-TileColor" content="#C8200E" />

    <!-- Fallback CSS para navegadores sin screen.orientation.lock -->
    <style>
      #landscape-msg { display: none; }
      @media (orientation: landscape) {
        body > #root   { display: none; }
        #landscape-msg { display: flex; }
      }
    </style>
  </head>
  <body>
    <div id="landscape-msg" style="
      position: fixed; inset: 0; z-index: 9999;
      background: #1a1a1a; color: #fff;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; font-family: sans-serif; text-align: center;
    ">
      <div style="font-size: 48px;">&#x1F4F1;</div>
      <div style="font-size: 18px; font-weight: 600;">Gira el teléfono</div>
      <div style="font-size: 13px; opacity: .6;">Este dashboard está optimizado para modo vertical</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!-- Registrar Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('[PWA] Service Worker registrado:', reg.scope))
            .catch(err => console.warn('[PWA] Service Worker fallido:', err))
        })
      }
    </script>
  </body>
</html>
