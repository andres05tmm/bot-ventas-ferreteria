# nixpacks.toml — Solo maneja el build (install + compilación del dashboard).
# El startCommand lo define railway.json por servicio:
#   API/Dashboard:  python3 -m uvicorn api:app --host 0.0.0.0 --port $PORT
#   Bot:            python3 start-bot.py
# NO incluir [start] aquí para evitar conflictos con railway.json.

[phases.setup]
nixPkgs = ["nodejs_20", "python311", "python311Packages.pip"]

[phases.install]
cmds = [
  "pip3 install -r requirements.txt --break-system-packages",
  "cd dashboard && npm install"
]

[phases.build]
cmds = [
  "cd dashboard && npm run build"
]
